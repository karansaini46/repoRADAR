version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: autoscan_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-autoscan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autoscan_redis
    restart: always
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: autoscan_api
    restart: always
    command: uvicorn autoscan.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./autoscan:/app/autoscan
      - reports_data:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: autoscan_scheduler
    restart: always
    command: python -m autoscan.orchestration.scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./autoscan:/app/autoscan
      - reports_data:/app/reports

  worker:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: autoscan_worker
    restart: always
    command: rq worker discovery enrichment cloning scanning verification impact reporting contacts outreach followup --url redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./autoscan:/app/autoscan
      - reports_data:/app/reports

  frontend:
    build:
      context: ./frontend
    container_name: autoscan_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file: ./frontend/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

  nginx:
    image: nginx:alpine
    container_name: autoscan_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  reports_data:
